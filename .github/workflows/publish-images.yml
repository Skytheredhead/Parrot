name: Publish backend images

on:
  push:
    branches:
      - main
    paths:
      - "infra/docker/**"
      - "packages/**"
      - "services/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/publish-images.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

concurrency:
  group: backend-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish ${{ matrix.service }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway
            dockerfile: infra/docker/gateway.Dockerfile
          - service: worker
            dockerfile: infra/docker/worker.Dockerfile
    steps:
      - name: Check out source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Sign in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish immutable image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ghcr.io/skytheredhead/parrot-${{ matrix.service }}:sha-${{ github.sha }}
            ghcr.io/skytheredhead/parrot-${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Record immutable deployment reference
        run: |
          printf '%s\n' \
            'ghcr.io/skytheredhead/parrot-${{ matrix.service }}@${{ steps.build.outputs.digest }}' \
            | tee '${{ runner.temp }}/${{ matrix.service }}-image.txt'

      - name: Upload deployment reference
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.service }}-image
          path: ${{ runner.temp }}/${{ matrix.service }}-image.txt
          if-no-files-found: error
          retention-days: 14
